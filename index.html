<meta charset="utf-8">
<div id="app">
  <div class="wrap">
    <header>
      <h1>🎀 Good Boy Points</h1>
      <p class="sub">Be helpful. Earn treats. Climb the ranks. 🏆</p>
      <div id="status" class="status"></div>
    </header>

    <div id="loading" class="card center">Fetching the scoreboard…</div>

    <div id="main" style="display:none">
      <!-- Champion spotlight -->
      <div id="champion" class="champion" style="display:none"></div>

      <div id="board" class="board"></div>
      <button id="addPlayerBtn" class="ghost-btn">+ Add a guy</button>

      <!-- Reward ladder: what they can earn -->
      <h2 class="section-title">🎁 What You Can Earn</h2>
      <div id="rewards" class="rewards"></div>

      <h2 class="section-title">📋 Activity Feed</h2>
      <div id="feed" class="feed"></div>
    </div>
  </div>

  <!-- Points modal (rewards only) -->
  <div id="modal" class="overlay" style="display:none">
    <div class="modal">
      <div class="modal-head">
        <span class="mh-left"><span id="modalAvatar"></span><span id="modalName">Player</span></span>
        <button class="x" onclick="closeModal()">✕</button>
      </div>
      <div id="modalFact" class="modal-fact"></div>
      <button class="edit-btn" onclick="editPlayer()">✏️ Edit his profile</button>
      <div class="col-label">Give him points 🥰</div>
      <div class="presets">
        <button onclick="quick(3,'💬 gave a genuine compliment')">💬 Genuine compliment <b>+3</b></button>
        <button onclick="quick(8,'💐 bought flowers')">💐 Bought flowers <b>+8</b></button>
        <button onclick="quick(10,'🧹 did a chore unprompted')">🧹 Did a chore unprompted <b>+10</b></button>
        <button onclick="quick(12,'🍳 cooked a meal')">🍳 Cooked a meal <b>+12</b></button>
        <button onclick="quick(12,'📅 planned something thoughtful')">📅 Planned something thoughtful <b>+12</b></button>
        <button onclick="quick(15,'🛠️ took a task off her plate')">🛠️ Took a task off her plate <b>+15</b></button>
        <button onclick="quick(20,'☕ made or brought you coffee')">☕ Made or brought you coffee <b>+20</b></button>
        <button onclick="quick(20,'💝 went above and beyond')">💝 Went above &amp; beyond <b>+20</b></button>
        <button onclick="quick(50,'🎁 surprised her with an unprompted gift')">🎁 Surprise unprompted gift <b>+50</b></button>
        <button onclick="quick(200,'✈️ planned a weekend trip')">✈️ Planned a weekend trip <b>+200</b></button>
      </div>
      <div class="custom">
        <div class="col-label">Custom reward</div>
        <div class="custom-row">
          <input id="customPts" type="number" min="1" placeholder="+pts" />
          <input id="customReason" type="text" placeholder="what he did…" />
        </div>
        <button class="apply" onclick="customApply()">Give points</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>
</div>

<style>
  #app { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #2b2118; }
  .wrap { max-width: 560px; margin: 0 auto; padding: 8px 14px 60px; }
  header { text-align: center; margin: 10px 0 18px; }
  h1 { font-size: 30px; margin: 4px 0; letter-spacing: -0.5px; }
  .sub { color: #9a8a72; font-size: 14px; margin: 0; }
  .status { font-size: 12px; margin-top: 8px; font-weight: 600; min-height: 16px; }
  .status.ok { color: #3f9d5a; }
  .status.warn { color: #d05656; }
  .card { background: #fff8ec; border: 2px solid #f0e2c8; border-radius: 16px; padding: 18px; }
  .center { text-align: center; color: #9a8a72; }
  .section-title { font-size: 16px; margin: 28px 0 10px; color: #8a7a60; }

  /* Champion spotlight */
  .champion {
    background: linear-gradient(135deg, #fff3d2, #ffe6a8);
    border: 2px solid #e9c65f; border-radius: 18px;
    padding: 14px 18px; margin-bottom: 16px; text-align: center;
    box-shadow: 0 6px 20px rgba(220,175,60,.25);
  }
  .champion .crown { font-size: 26px; }
  .champion .cname { font-size: 20px; font-weight: 800; margin: 2px 0; }
  .champion .clabel { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: #b58a1e; }
  .champion .clevel { font-size: 13px; color: #8a6d1f; font-weight: 600; }
  .champion .avatar { width: 60px; height: 60px; font-size: 32px; margin: 2px auto 4px; border-color: #e9c65f; }

  .board { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .row {
    display: flex; align-items: center; gap: 12px;
    background: #fff8ec; border: 2px solid #f0e2c8; border-radius: 16px;
    padding: 14px 16px; cursor: pointer; transition: transform .08s, box-shadow .15s;
  }
  .row.leader { border-color: #e9c65f; background: #fffaf0; }
  .row:active { transform: scale(0.98); }
  .row:hover { box-shadow: 0 4px 14px rgba(210,170,90,.18); }
  .rank { font-size: 20px; width: 26px; text-align: center; flex-shrink: 0; }
  .rank.num { font-size: 14px; color: #b8a888; font-weight: 700; }

  /* Avatar */
  .avatar { width: 42px; height: 42px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 22px; background: #fbeecb; border: 2px solid #f0e2c8; overflow: hidden; flex-shrink: 0; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }

  .pmid { flex: 1; min-width: 0; }
  .pname { font-size: 17px; font-weight: 600; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .level-tag { font-size: 11px; font-weight: 700; color: #a07d2a; background: #fbeecb; padding: 2px 7px; border-radius: 20px; white-space: nowrap; }
  .fact { font-size: 12px; color: #a08a63; font-style: italic; margin: 2px 0 1px; }
  .progress-wrap { margin-top: 6px; }
  .bar { height: 7px; background: #f0e6d0; border-radius: 6px; overflow: hidden; }
  .bar > i { display: block; height: 100%; background: linear-gradient(90deg, #f0c14b, #e0a83f); border-radius: 6px; transition: width .4s; }
  .next { font-size: 11px; color: #a8987a; margin-top: 4px; }
  .pts { font-size: 22px; font-weight: 800; min-width: 42px; text-align: right; color: #3f9d5a; }
  .pts.zero { color: #b8a888; }
  .tap-hint { font-size: 11px; color: #c4b393; font-weight: 500; }

  .ghost-btn {
    width: 100%; padding: 13px; border: 2px dashed #e0cfa8; background: transparent;
    color: #b39960; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .ghost-btn:hover { background: #fdf6e7; }

  /* Rewards ladder */
  .rewards { display: flex; flex-direction: column; gap: 8px; }
  .reward-item {
    display: flex; align-items: center; gap: 12px;
    background: #fffdf8; border: 1px solid #f2e8d4; border-radius: 12px; padding: 11px 14px;
  }
  .reward-item .rcost { font-size: 15px; font-weight: 800; color: #e0a83f; min-width: 62px; }
  .reward-item .rname { flex: 1; font-size: 14px; color: #5f5238; }
  .reward-item .rwho { font-size: 11px; font-weight: 700; color: #3f9d5a; white-space: nowrap; }
  .reward-item.locked { opacity: .72; }

  .feed { display: flex; flex-direction: column; gap: 6px; }
  .feed-item {
    font-size: 13px; color: #6b5d47; background: #fffdf8; border: 1px solid #f2e8d4;
    border-radius: 10px; padding: 9px 12px; display: flex; justify-content: space-between; gap: 10px;
  }
  .feed-item .fp { font-weight: 800; white-space: nowrap; color: #3f9d5a; }
  .feed-empty { color: #c4b393; font-size: 13px; text-align: center; padding: 10px; }

  .overlay { position: fixed; inset: 0; background: rgba(40,30,15,.45); display: flex; align-items: flex-end; justify-content: center; z-index: 50; }
  .modal { background: #fffdf8; width: 100%; max-width: 560px; border-radius: 20px 20px 0 0; padding: 18px 18px 26px; box-shadow: 0 -6px 30px rgba(0,0,0,.2); }
  .modal-head { display: flex; justify-content: space-between; align-items: center; font-size: 20px; font-weight: 800; margin-bottom: 6px; }
  .mh-left { display: inline-flex; align-items: center; gap: 10px; }
  .mh-left .avatar { width: 34px; height: 34px; font-size: 19px; }
  .modal-fact { font-size: 13px; color: #a08a63; font-style: italic; margin: 0 0 12px; }
  .x { border: none; background: #f0e6d2; width: 32px; height: 32px; border-radius: 50%; font-size: 15px; cursor: pointer; flex-shrink: 0; }
  .edit-btn { width: 100%; padding: 9px; margin-bottom: 14px; border: 1px dashed #e0cfa8; background: transparent; color: #b39960; border-radius: 10px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .edit-btn:hover { background: #fdf6e7; }
  .col-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: #a8987a; margin-bottom: 8px; }
  .presets { display: flex; flex-direction: column; gap: 7px; }
  .presets button { text-align: left; border: 2px solid #cdebd3; color: #2f7a45; border-radius: 12px; padding: 11px 13px; font-size: 14px; cursor: pointer; background: #fff; display: flex; justify-content: space-between; align-items: center; }
  .presets button:hover { background: #f0faf2; }
  .presets button b { font-size: 15px; }
  .custom { margin-top: 16px; }
  .custom-row { display: flex; gap: 8px; }
  .custom input { border: 2px solid #f0e2c8; border-radius: 12px; padding: 11px; font-size: 15px; }
  #customPts { width: 80px; }
  #customReason { flex: 1; }
  .apply { margin-top: 8px; width: 100%; padding: 12px; border: none; border-radius: 12px; background: #e0a83f; color: #fff; font-weight: 700; font-size: 15px; cursor: pointer; }
  .apply:hover { background: #d19a30; }

  /* Toast */
  .toast {
    position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%) translateY(20px);
    background: #2f7a45; color: #fff; padding: 12px 20px; border-radius: 30px;
    font-size: 14px; font-weight: 700; box-shadow: 0 8px 24px rgba(0,0,0,.25);
    opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s; z-index: 60; max-width: 90%; text-align: center;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.gold { background: #d9a022; }

  .confetti { position: fixed; top: -20px; font-size: 18px; z-index: 55; pointer-events: none; animation: fall linear forwards; }
  @keyframes fall { to { transform: translateY(105vh) rotate(360deg); opacity: .9; } }
</style>

<script>
  // ============================================================
  //  ⚙️  JSONBIN CONFIG
  const BIN_ID = '6a4957eaf5f4af5e295fe92e';
  const MASTER_KEY = '$2a$10$b2Guy1KOs2DZfAQi.quG0eUrm4sTVYzJ4whVLPlIN4bCaVe2SLi9q';
  // ============================================================

  //  📲  SMS NOTIFICATIONS (optional) — see SMS_SETUP.md
  //  Blank NOTIFY_URL = off. Paste your Cloudflare Worker URL to turn texts on.
  const NOTIFY_URL = '';
  const NOTIFY_KEY = 'goodboy-secret-change-me'; // must match SHARED_KEY in the Worker
  // ============================================================

  //  🎁  REWARD LADDER — edit freely (cost = points needed)
  const REWARDS = [
    { cost: 50,  name: '🍽️ Dinner of your choice' },
    { cost: 100, name: '💆 A 30-minute massage' },
    { cost: 175, name: '👑 "Best Boy" — a full day your way' },
  ];

  //  🏅  LEVELS — title unlocked at each points threshold
  const LEVELS = [
    { min: 0,   title: '🐶 Puppy-in-training' },
    { min: 25,  title: '🎀 Good Boy' },
    { min: 50,  title: '⭐ Very Good Boy' },
    { min: 100, title: '🌟 Star Boy' },
    { min: 175, title: '👑 Best Boy' },
  ];

  const CHEERS = ['Good boy! 🎉', 'Nice one! 💪', 'She noticed. 😊', 'Keep it up! 🔥', 'Certified helpful. ✅', 'Points earned! 🎀'];

  const BASE = 'https://api.jsonbin.io/v3/b/' + BIN_ID;
  const CONFIGURED = !BIN_ID.includes('YOUR-BIN') && !MASTER_KEY.includes('YOUR-');
  const HEADERS = { 'Content-Type': 'application/json', 'X-Master-Key': MASTER_KEY };
  let state = { players: [], log: [] };
  let activeName = null;

  function levelFor(pts) {
    let lv = LEVELS[0];
    for (const l of LEVELS) if (pts >= l.min) lv = l;
    return lv.title;
  }
  function nextReward(pts) {
    for (const r of REWARDS) if (pts < r.cost) return r;
    return null; // maxed out
  }
  function prevRewardCost(pts) {
    let base = 0;
    for (const r of REWARDS) { if (pts >= r.cost) base = r.cost; }
    return base;
  }

  // Rewards-only: scrub any leftover negatives from the old "bad boy" system
  function sanitize() {
    let changed = false;
    for (const p of state.players) {
      if (typeof p.points !== 'number' || isNaN(p.points)) { p.points = 0; changed = true; }
      if (p.points < 0) { p.points = 0; changed = true; }
    }
    const before = (state.log || []).length;
    state.log = (state.log || []).filter(e => e && e.pts > 0);
    if (state.log.length !== before) changed = true;
    return changed;
  }

  function setStatus(msg, ok) {
    const el = document.getElementById('status');
    if (el) { el.textContent = msg; el.className = 'status ' + (ok ? 'ok' : 'warn'); }
  }
  function reason(code) {
    if (code === 401) return 'Check your X-Master-Key.';
    if (code === 404) return 'Check your Bin ID.';
    return '';
  }

  async function load() {
    if (!CONFIGURED) {
      setStatus('⚠ Add your Bin ID + X-Master-Key in the code (top of the script).', false);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('main').style.display = 'block';
      render();
      return;
    }
    try {
      const res = await fetch(BASE + '/latest', { headers: HEADERS });
      if (!res.ok) {
        setStatus(`⚠ Read failed (${res.status}). ${reason(res.status)}`, false);
      } else {
        const json = await res.json();
        const data = json.record || json;
        if (data && Array.isArray(data.players)) { state = data; setStatus('✓ Synced', true); }
        else setStatus('✓ Synced', true);
      }
    } catch (e) {
      setStatus('⚠ Can\'t reach jsonbin — check your connection.', false);
    }
    if (sanitize()) await save(); // one-time cleanup of old negatives
    document.getElementById('loading').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    render();
  }

  async function save() {
    if (!CONFIGURED) { setStatus('⚠ Not saved — add your jsonbin info first.', false); return; }
    try {
      const res = await fetch(BASE, { method: 'PUT', headers: HEADERS, body: JSON.stringify(state) });
      if (!res.ok) setStatus(`⚠ Save failed (${res.status}). ${reason(res.status)}`, false);
      else setStatus('✓ Synced', true);
    } catch (e) {
      setStatus('⚠ Save failed — check your connection.', false);
    }
  }

  function render() {
    const sorted = [...state.players].sort((a, b) => b.points - a.points);

    // Champion spotlight
    const champ = document.getElementById('champion');
    const leader = sorted[0];
    if (leader && leader.points > 0) {
      champ.style.display = 'block';
      champ.innerHTML = `
        <div class="crown">👑</div>
        ${avatar(leader)}
        <div class="clabel">King of Good Boys · Winner of the Day</div>
        <div class="cname">${escapeHtml(leader.name)}</div>
        <div class="clevel">${levelFor(leader.points)} · ${leader.points} pts</div>`;
    } else {
      champ.style.display = 'none';
    }

    // Board with avatars, levels, fun facts, progress to next reward
    const board = document.getElementById('board');
    const medals = ['🥇', '🥈', '🥉'];
    board.innerHTML = sorted.map((p, i) => {
      const rank = i < 3 ? `<span class="rank">${medals[i]}</span>` : `<span class="rank num">${i + 1}</span>`;
      const nr = nextReward(p.points);
      const floor = prevRewardCost(p.points);
      let pct = 100, nextLine = '🏆 Maxed out — every reward unlocked!';
      if (nr) {
        pct = Math.max(0, Math.min(100, ((p.points - floor) / (nr.cost - floor)) * 100));
        nextLine = `${nr.cost - p.points} pts to ${escapeHtml(nr.name)}`;
      }
      const leaderCls = i === 0 && p.points > 0 ? ' leader' : '';
      return `<div class="row${leaderCls}" onclick="openModal('${encodeURIComponent(p.name)}')">
        ${rank}
        ${avatar(p)}
        <div class="pmid">
          <div class="pname">${escapeHtml(p.name)} <span class="level-tag">${levelFor(p.points)}</span></div>
          ${p.fact ? `<div class="fact">“${escapeHtml(p.fact)}”</div>` : ''}
          <div class="progress-wrap">
            <div class="bar"><i style="width:${pct}%"></i></div>
            <div class="next">${nextLine} · <span class="tap-hint">tap to score</span></div>
          </div>
        </div>
        <span class="pts ${p.points === 0 ? 'zero' : ''}">${p.points}</span>
      </div>`;
    }).join('') || '<div class="card center">No players yet — add the crew below 👇</div>';

    // Rewards ladder — show who's earned each
    const rew = document.getElementById('rewards');
    rew.innerHTML = REWARDS.map(r => {
      const earned = sorted.filter(p => p.points >= r.cost).map(p => p.name);
      const who = earned.length ? `✓ ${earned.map(escapeHtml).join(', ')}` : `🔒 ${r.cost} pts`;
      return `<div class="reward-item ${earned.length ? '' : 'locked'}">
        <span class="rcost">${r.cost} pts</span>
        <span class="rname">${escapeHtml(r.name)}</span>
        <span class="rwho">${who}</span>
      </div>`;
    }).join('');

    // Feed (positive events only)
    const feed = document.getElementById('feed');
    const entries = state.log.filter(e => e.pts > 0);
    feed.innerHTML = entries.length
      ? entries.slice(0, 25).map(e =>
          `<div class="feed-item"><span>${escapeHtml(e.name)} ${escapeHtml(e.reason)}</span><span class="fp">+${e.pts}</span></div>`
        ).join('')
      : '<div class="feed-empty">Nothing yet. Someone go be helpful. 🎀</div>';
  }

  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

  // Avatar: photo if provided, otherwise emoji in a circle (default 🐶)
  function avatar(p) {
    const emoji = escapeHtml(p.emoji || '🐶');
    if (p.photo) return `<span class="avatar"><img src="${escapeHtml(p.photo)}" alt="" onerror="this.parentNode.textContent='${emoji}'"></span>`;
    return `<span class="avatar emoji">${emoji}</span>`;
  }

  // Shared prompts for a guy's profile (used by add + edit)
  function promptProfile(existing) {
    const emoji = (prompt('Pick an emoji avatar (e.g. 🐕 🦊 🐻 🦁 🐶):', (existing && existing.emoji) || '🐶') || '').trim();
    const fact  = (prompt('A fun fact or nickname (optional):', (existing && existing.fact) || '') || '').trim();
    const photo = (prompt('Photo URL (optional — paste a link to a pic):', (existing && existing.photo) || '') || '').trim();
    return { emoji: emoji || '🐶', fact, photo };
  }

  // Fire-and-forget: tell the Worker to text the OTHER guys
  function notify(scorer, pts, reason) {
    if (!NOTIFY_URL || !(pts > 0)) return;
    try {
      fetch(NOTIFY_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key: NOTIFY_KEY, scorer, pts, reason })
      }).catch(() => {});
    } catch (e) {}
  }

  function toast(msg, gold) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show' + (gold ? ' gold' : '');
    clearTimeout(t._h);
    t._h = setTimeout(() => { t.className = 'toast'; }, 2600);
  }
  function confetti() {
    const emojis = ['🎉', '🎀', '⭐', '🏆', '✨'];
    for (let i = 0; i < 18; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      c.style.left = Math.random() * 100 + 'vw';
      c.style.animationDuration = (1.6 + Math.random() * 1.2) + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 3000);
    }
  }

  async function addPlayer() {
    const name = prompt('Name of the guy:');
    if (!name || !name.trim()) return;
    if (state.players.some(p => p.name.toLowerCase() === name.trim().toLowerCase())) { alert('Already on the board.'); return; }
    const prof = promptProfile();
    state.players.push({ name: name.trim(), points: 0, emoji: prof.emoji, fact: prof.fact, photo: prof.photo });
    await save(); render();
  }

  async function editPlayer() {
    const p = state.players.find(x => x.name === activeName);
    if (!p) return;
    const prof = promptProfile(p);
    p.emoji = prof.emoji; p.fact = prof.fact; p.photo = prof.photo;
    await save();
    openModal(encodeURIComponent(activeName)); // refresh modal contents
    render();
  }

  function openModal(enc) {
    activeName = decodeURIComponent(enc);
    const p = state.players.find(x => x.name === activeName);
    document.getElementById('modalName').textContent = activeName;
    document.getElementById('modalAvatar').innerHTML = p ? avatar(p) : '';
    const factEl = document.getElementById('modalFact');
    if (p && p.fact) { factEl.textContent = '“' + p.fact + '”'; factEl.style.display = 'block'; }
    else { factEl.textContent = ''; factEl.style.display = 'none'; }
    document.getElementById('customPts').value = '';
    document.getElementById('customReason').value = '';
    document.getElementById('modal').style.display = 'flex';
  }
  function closeModal() { document.getElementById('modal').style.display = 'none'; }

  async function quick(pts, reason) { await applyPoints(pts, reason); }
  async function customApply() {
    const pts = parseInt(document.getElementById('customPts').value, 10);
    const reason = document.getElementById('customReason').value.trim();
    if (!pts || isNaN(pts) || pts <= 0) { alert('Enter a positive point value (e.g. 5). This board is rewards only. 🎀'); return; }
    await applyPoints(pts, reason || 'earned points');
  }

  async function applyPoints(pts, reason) {
    const p = state.players.find(x => x.name === activeName);
    if (!p) return;
    const before = p.points;
    p.points += pts;
    const after = p.points;
    state.log.unshift({ name: activeName, pts, reason, t: Date.now() });
    if (state.log.length > 100) state.log = state.log.slice(0, 100);

    // Celebration: did he unlock a reward or level up?
    const unlockedReward = REWARDS.find(r => before < r.cost && after >= r.cost);
    const leveledUp = levelFor(before) !== levelFor(after) && after > before;

    if (unlockedReward) {
      toast(`🎁 ${activeName} unlocked ${unlockedReward.name.replace(/^[^ ]+ /, '')}!`, true);
      confetti();
    } else if (leveledUp) {
      toast(`🏅 ${activeName} leveled up to ${levelFor(after).replace(/^[^ ]+ /, '')}!`, true);
      confetti();
    } else {
      toast(`+${pts} · ${CHEERS[Math.floor(Math.random() * CHEERS.length)]}`);
    }

    await save();
    notify(activeName, pts, reason); // text the other guys
    closeModal();
    render();
  }

  document.getElementById('addPlayerBtn').addEventListener('click', addPlayer);
  load();
  setInterval(load, 8000);
</script>
